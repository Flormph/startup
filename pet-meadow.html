<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gedidone HTML</title>
        <link rel="icon" href="Assets/axolotl%20favicon.ico" />
        <script type="module" src="/src/main.js"></script>
    </head>

    <body class="font-geist bg-[antiquewhite] m-0 pt-[100px]">
        <header class="bg-[#f3c3e0] p-2.5 text-center text-[hsl(319,25%,46%)] border-b-2 border-[hsl(319,25%,46%)] flex gap-[30px] justify-start items-center fixed top-0 left-0 w-full box-border z-50">
            <a href="index.html" class="text-[hsl(319,25%,46%)] bg-[antiquewhite] no-underline text-2xl font-bold p-2.5 py-1 border-2 border-[hsl(319,25%,46%)] hover:bg-[hsl(319,25%,46%)] hover:text-[antiquewhite]">Gedidone</a>
            
            <button id="nav-toggle" class="md:hidden text-2xl px-3" aria-label="Toggle navigation">
                ☰
            </button>

            <nav id="nav-menu" class="hidden md:flex absolute md:static top-full left-0 w-full md:w-auto bg-[#f3c3e0] md:bg-transparent border-b-2 border-[hsl(319,25%,46%)] md:border-none">
            <ul class="flex flex-col md:flex-row items-start gap-4 md:gap-12 list-none m-0 p-4 md:p-0">
                <li><a href="sticky-note.html" class="text-[hsl(319,25%,46%)] no-underline">Sticky Note</a></li>
                <li><a href="pet-meadow.html" class="text-[hsl(319,25%,46%)] no-underline">Pet Meadow</a></li>
                <li><a href="about.html" class="text-[hsl(319,25%,46%)] no-underline">About</a></li>
            </ul>
            </nav>
        </header>

        <hr />

    <main class="p-6 flex flex-col items-center gap-4">
        <h1 class="text-2xl font-bold text-[hsl(319,25%,46%)]">Pet Meadow (WIP)</h1>

        <section class="text-sm text-[hsl(319,25%,46%)]">Upon loading, web socket will backup the sticky note database</section>
        <section class="text-sm text-[hsl(319,25%,46%)]">Weather api will affect the setting</section>

        <!-- Meadow scene: bounded window the pet lives inside -->
        <div id="meadow-scene" class="relative w-full max-w-2xl h-96 overflow-hidden rounded-lg border-2 border-[hsl(319,25%,46%)] bg-gradient-to-b from-sky-200 to-sky-100">

            <!-- Ground -->
            <div class="absolute bottom-0 left-0 w-full h-1/4 bg-green-300 border-t-2 border-green-500"></div>

            <!-- Pet: absolutely positioned so JS can move it later for idle/wander animations -->
            <img id="pet" src="Assets/axolotl.png" alt="Axolotl Pet"
                class="absolute bottom-[15%] left-1/2 -translate-x-1/2 w-32 h-32 select-none">

        </div>

        <p class="text-[hsl(319,25%,46%)]">Pet menu goes here.</p>
    </main>
    </body>

    <footer>
        <hr />
        <span class="text-black opacity-75">Joseph Lee</span>
        <br />
        <a  href="https://www.github.com/Flormph/startup" class= "text-[hsl(319,25%,46%)] no-underline opacity-75" title="GitHub repository">GitHub repository</a>
        <br />
        <a href="https://www.flaticon.com/free-icons/axolotl" title="axolotl icons" class="text-[hsl(319,25%,46%)] no-underline opacity-75">Axolotl icons created by Freepik - Flaticon</a>
    </footer>
</html>
