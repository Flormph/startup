<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gedidone HTML</title>
        <link rel="icon" href="Assets/axolotl%20favicon.ico" />
        <script type="module" src="/src/main.js"></script>
    </head>

    <body class="font-geist bg-[antiquewhite] m-0">
        <header class="bg-[#f3c3e0] p-2.5 text-center text-[hsl(319,25%,46%)] border-b-2 border-[hsl(319,25%,46%)] flex gap-[30px] justify-start items-center sticky top-0 left-0 w-full box-border">
            <a href="index.html" class="text-[hsl(319,25%,46%)] bg-[antiquewhite] no-underline text-2xl font-bold p-2.5 py-1 border-2 border-[hsl(319,25%,46%)] hover:bg-[hsl(319,25%,46%)] hover:text-[antiquewhite]">Gedidone</a>
            
            <button id="nav-toggle" class="md:hidden text-2xl px-3" aria-label="Toggle navigation">
                ☰
            </button>

            <nav id="nav-menu" class="hidden md:flex absolute md:static top-full left-0 w-full md:w-auto bg-[#f3c3e0] md:bg-transparent border-b-2 border-[hsl(319,25%,46%)] md:border-none">
            <ul class="flex flex-col md:flex-row items-start gap-4 md:gap-12 list-none m-0 p-4 md:p-0">
                <li><a href="sticky-note.html" class="text-[hsl(319,25%,46%)] no-underline">Sticky Note</a></li>
                <li><a href="pet-meadow.html" class="text-[hsl(319,25%,46%)] no-underline">Pet Meadow</a></li>
                <li><a href="about.html" class="text-[hsl(319,25%,46%)] no-underline">About</a></li>
            </ul>
            </nav>
        </header>

        <main>
            <h2>Welcome to Gedidone!</h2>
            <p>Log in or create an account to get started!"</p>

            <form method="post" action="sticky-note.html" class="flex flex-col gap-2.5 p-5 items-center border-2 border-[hsl(319,25%,46%)]">
                <div class="flex items-center gap-2">
                    <span class="w-24 text-right">Email:</span>
                    <input type="email" name="email" required placeholder="Enter your email"
                        class="flex-1 border-2 border-[hsl(319,25%,46%)] rounded px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-[hsl(319,25%,46%)]">
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-24 text-right">Password:</span>
                    <input type="password" name="password" required placeholder="Enter your password"
                        class="flex-1 border-2 border-[hsl(319,25%,46%)] rounded px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-[hsl(319,25%,46%)]">
                </div>
                <div class="flex gap-2.5">
                    <input type="submit" value="Log In" name="login-action"
                        class="px-4 py-2 rounded cursor-pointer bg-[hsl(319,25%,46%)] text-[antiquewhite] border-none hover:bg-[hsl(319,25%,56%)]">
                    <input type="submit" value="Create Account" name="create-account-action"
                        class="px-4 py-2 rounded cursor-pointer bg-[hsl(319,25%,46%)] text-[antiquewhite] border-none hover:bg-[hsl(319,25%,56%)]">
                </div>
            </form>
        </main>
    </body>

<footer class="p-6 text-center text-sm text-[hsl(319,25%,46%)]">
    <hr class="gedidone-divider border-[hsl(319,25%,46%)] mb-4 w-screen relative left-1/2 -translate-x-1/2" />
    <span class="text-black opacity-75">Joseph Lee</span>
    <br />
    <a  href="https://www.github.com/Flormph/startup" class= "text-[hsl(319,25%,46%)] no-underline opacity-75" title="GitHub repository">GitHub repository</a>
    <br />
    <a href="https://www.flaticon.com/free-icons/axolotl" title="axolotl icons" class="text-[hsl(319,25%,46%)] no-underline opacity-75">Axolotl icons created by Freepik - Flaticon</a>
    </footer>
</html>
