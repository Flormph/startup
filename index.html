<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gedidone HTML</title>
        <link rel="icon" href="Assets/axolotl%20favicon.ico" />
        <link rel="stylesheet" href="index.css" />
        <script type="module" src="/src/main.js"></script>
    </head>

    <body class="font-mono bg-[antiquewhite] m-0 pt-[100px]">
        <header class="bg-[#f3c3e0] p-2.5 text-center text-[hsl(319,25%,46%)] border-b-2 border-[hsl(319,25%,46%)] flex gap-[30px] justify-start items-center fixed top-0 left-0 w-full box-border">
            <a href="index.html" class="text-[hsl(319,25%,46%)] bg-[antiquewhite] no-underline text-2xlfont-bold p-2.5 py-1 border-2 border-[hsl(319,25%,46%)] hover:bg-[hsl(319,25%,46%)] hover:text-[antiquewhite]">Gedidone</a>
            <nav>
            <ul class="flex gap-12 list-none m-0 p-0 flex-wrap">
                <li><a href="sticky-note.html" class="text-[hsl(319,25%,46%)] no-underline">Sticky Note</a></li>
                <li><a href="pet-meadow.html" class="text-[hsl(319,25%,46%)] no-underline">Pet Meadow</a></li>
                <li><a href="about.html" class="text-[hsl(319,25%,46%)] no-underline">About</a></li>
            </ul>
            </nav>
        </header>

        <main>
            <h2">Welcome to Gedidone!</h2>
            <p>Log in or create an account to get started!"</p>

            <form method="post" action="sticky-note.html">
                <div>
                    <span>Email:</span>
                    <input type="email" name="email" required placeholder="Enter your email">
                </div>
                <div>
                    <span>Password:</span>
                    <input type="password" name="password" required placeholder="Enter your password">
                </div>
                <div class="form-actions">
                    <input type="submit" value="Log In" name="login-action">
                    <input type="submit" value="Create Account" name="create-account-action">
                </div>
            </form>
        </main>
    </body>

    <footer>
        <hr />
        <span class="text-reset">Joseph Lee</span>
        <br />
        <a href="https://www.github.com/Flormph/startup" title="GitHub repository">GitHub repository</a>
        <br />
        <a href="https://www.flaticon.com/free-icons/axolotl" title="axolotl icons">Axolotl icons created by Freepik - Flaticon</a>
    </footer>
</html>
